<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard – 8 NewLight</title>
<link rel="stylesheet" href="/sidebar.css"/><link rel="stylesheet" href="/theme.css"/>
<style>
  body { margin:0; color:var(--ink); }
  .wrap { padding:16px; max-width:1180px; margin:0 auto; }
  @media(min-width:900px){ .wrap{ padding:24px; } }

  .head { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
  .head h1 { margin:0; font-size:24px; }
  .head .spacer { flex:1; }
  .head .who { font-size:13px; color:var(--muted); }
  .head select, .head button { margin:0; width:auto; min-height:40px; padding:8px 14px; font-size:14px; }
  .head button { background:var(--brand); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
  .head .icon-btn { background:var(--card); color:var(--brand-ink); border:1px solid var(--border); }
  .sub { color:var(--muted); font-size:14px; margin:2px 0 18px; }

  .status { padding:40px; text-align:center; color:var(--muted); font-size:15px; }
  .err { color:var(--danger); font-weight:600; }

  /* KPI hero */
  .kpis { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
  @media(max-width:960px){ .kpis{ grid-template-columns:repeat(2,1fr); } }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow-sm); position:relative; }
  .kpi.hero { border-left:4px solid var(--brand); }
  .kpi .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700; }
  .kpi .val { font-family:var(--font-brand); font-size:25px; font-weight:700; color:var(--brand-ink); margin-top:6px; font-variant-numeric:tabular-nums; }
  .kpi .val.neg { color:var(--danger); }
  .kpi .delta { font-size:12px; margin-top:6px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
  .delta.up { color:var(--positive); } .delta.down { color:var(--danger); }
  .kpi .foot { font-size:11px; color:var(--muted); margin-top:2px; }

  /* layout grids */
  .grid2 { display:grid; grid-template-columns:1.6fr 1fr; gap:16px; margin-bottom:16px; }
  .grid2b { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  @media(max-width:900px){ .grid2, .grid2b { grid-template-columns:1fr; } }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:var(--shadow-sm); }
  .panel h2 { font-size:15px; margin:0 0 14px; color:var(--brand-ink); }
  .panel .h-note { font-weight:400; font-size:12px; color:var(--muted); }

  /* daily chart */
  .chart { width:100%; height:200px; }
  .chart rect.bar { fill:var(--brand); transition:fill .15s; }
  .chart rect.bar.weekend { fill:var(--brand-700); }
  .chart rect.bar:hover { fill:var(--brand-ink); }
  .chart text.axis { fill:var(--muted); font-size:9px; }
  .chart line.grid { stroke:var(--border-soft); stroke-width:1; }

  /* P&L waterfall bars */
  .pnl-row { margin-bottom:12px; }
  .pnl-row .top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .pnl-row .top .name { color:var(--ink); font-weight:600; }
  .pnl-row .top .amt { font-variant-numeric:tabular-nums; color:var(--brand-ink); font-weight:600; }
  .pnl-row .top .amt.neg { color:var(--danger); }
  .bar-track { height:10px; background:var(--cream-soft); border-radius:999px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:999px; }
  .bar-fill.rev { background:var(--brand); }
  .bar-fill.cogs { background:#b98a5e; }
  .bar-fill.exp { background:#c1877e; }
  .bar-fill.net { background:var(--positive); }
  .bar-fill.net.neg { background:var(--danger); }
  .pnl-foot { font-size:12px; color:var(--muted); margin-top:2px; }

  /* top products */
  .prod { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .prod .rank { flex:0 0 22px; height:22px; border-radius:50%; background:#eef2f8; color:var(--brand-700); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .prod .pname { flex:0 0 120px; font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prod .pbar { flex:1; height:8px; background:var(--cream-soft); border-radius:999px; overflow:hidden; }
  .prod .pbar span { display:block; height:100%; background:var(--brand); border-radius:999px; }
  .prod .pval { flex:0 0 auto; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }

  /* alerts */
  .alert { display:flex; gap:10px; align-items:flex-start; padding:12px 14px; border-radius:12px; margin-bottom:10px; font-size:13px; }
  .alert .ico { font-size:18px; line-height:1; flex:0 0 auto; }
  .alert .msg { flex:1; }
  .alert .msg b { color:var(--brand-ink); }
  .alert.warn { background:#f7e6e3; border:1px solid #e7c3bc; }
  .alert.info { background:#eef2f8; border:1px solid #d6e0ee; }
  .alert.good { background:var(--positive-bg); border:1px solid #bcd8c6; }

  /* live month-to-date strip */
  .mtd-strip { display:flex; align-items:center; gap:22px; flex-wrap:wrap; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 20px; margin-bottom:16px; box-shadow:var(--shadow-sm); }
  .mtd-strip .dot { width:8px; height:8px; border-radius:50%; background:var(--positive); box-shadow:0 0 0 4px var(--positive-bg); flex:0 0 auto; }
  .mtd-strip .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700; }
  .mtd-strip .item { display:flex; flex-direction:column; gap:2px; }
  .mtd-strip .val { font-family:var(--font-brand); font-size:18px; font-weight:700; color:var(--brand-ink); font-variant-numeric:tabular-nums; }
  .mtd-strip .val .delta { font-size:12px; font-weight:600; margin-left:6px; }
  .mtd-strip .val .delta.up { color:var(--positive); } .mtd-strip .val .delta.down { color:var(--danger); }
  .mtd-strip .foot { font-size:11px; color:var(--muted); margin-left:auto; }

  /* Drill-down: clickable KPIs, top-products, chart bars */
  .kpi.clickable { cursor:pointer; transition:transform .1s, box-shadow .1s; }
  .kpi.clickable:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.08); }
  .kpi .drill-hint { font-size:10px; color:var(--brand-600); margin-top:4px; opacity:0; transition:opacity .1s; }
  .kpi.clickable:hover .drill-hint { opacity:1; }
  .prod.clickable { cursor:pointer; border-radius:8px; margin:0 -6px 10px; padding:2px 6px; transition:background .1s; }
  .prod.clickable:hover { background:var(--cream-soft); }
  .chart rect.bar { cursor:pointer; }
  .drill-link { color:var(--brand-600); cursor:pointer; font-weight:600; border-bottom:1px dashed transparent; }
  .drill-link:hover { border-bottom-color:var(--brand-600); }
  .pos { color:var(--positive); font-weight:600; }
  .pill { display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; background:#eef2f8; color:var(--brand-700); }
  .go { display:inline-block; font-size:11px; color:var(--brand-600); border:1px solid var(--border); border-radius:8px; padding:2px 8px; text-decoration:none; white-space:nowrap; }
  .go:hover { background:#eef2f8; }

  /* Stock alert heatmap — one tile per low/out ingredient, colored by severity */
  .heat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(104px,1fr)); gap:6px; }
  .heat-tile { position:relative; border-radius:8px; padding:8px 9px 7px; color:#fff; cursor:pointer; transition:transform .1s; display:flex; flex-direction:column; justify-content:space-between; }
  .heat-tile:hover { transform:translateY(-1px); }
  .heat-tile .heat-badge { position:absolute; top:5px; right:6px; font-size:10px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
  /* Wrap long ingredient names to a 2nd line (then ellipsis) instead of cutting
     them off mid-word on one line — grid stretches tiles per row so the taller
     2-line tiles keep the row aligned. */
  .heat-tile .heat-name { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; font-size:11px; font-weight:700; line-height:1.2; margin-bottom:4px; overflow:hidden; padding-right:14px; word-break:break-word; }
  .heat-tile .heat-qty { display:block; font-size:10px; opacity:.9; font-variant-numeric:tabular-nums; margin-top:auto; }

  /* Centered drill-down modal */
  .drawer-backdrop { position:fixed; inset:0; background:rgba(20,28,45,.45); opacity:0; pointer-events:none; transition:opacity .2s; z-index:60; }
  .drawer-backdrop.open { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:50%; left:50%; width:min(560px, 92vw); max-height:85vh; background:var(--card);
    box-shadow:0 24px 64px rgba(0,0,0,.28); border-radius:20px; transform:translate(-50%,-48%) scale(.97); opacity:0;
    transition:transform .18s ease, opacity .18s ease; z-index:61; display:flex; flex-direction:column; pointer-events:none; }
  .drawer.open { transform:translate(-50%,-50%) scale(1); opacity:1; pointer-events:auto; }
  .drawer-head { display:flex; align-items:flex-start; gap:12px; padding:16px 18px; border-bottom:1px solid var(--border); border-radius:20px 20px 0 0; }
  .drawer-title { font-family:var(--font-brand); font-size:20px; font-weight:700; line-height:1.15; }
  .drawer-sub { font-size:12px; color:var(--muted); margin-top:3px; }
  .drawer-close { margin-left:auto; border:none; background:var(--cream-soft); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:14px; color:var(--brand-ink); }
  .drawer-close:hover { background:#e6ebf3; }
  .drawer-body { padding:16px 18px; overflow:auto; border-radius:0 0 20px 20px; }
  .drawer-body h3 { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:18px 0 8px; }
  .drawer-body h3:first-child { margin-top:0; }
  .drawer-body table { width:100%; border-collapse:collapse; font-size:13px; }
  .drawer-body th, .drawer-body td { padding:6px 8px; text-align:left; border-bottom:1px solid var(--border); }
  .drawer-body th.num, .drawer-body td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .dl-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
  .dl-row .nm { flex:1; min-width:0; }
  .dl-row .bar { flex:0 0 90px; height:6px; background:var(--cream-soft); border-radius:999px; overflow:hidden; min-width:60px; }
  .dl-row .bar span { display:block; height:100%; background:var(--brand); border-radius:999px; }
  .dl-row .amt { font-variant-numeric:tabular-nums; font-weight:600; white-space:nowrap; }
  .dl-stat { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px; }
  .dl-stat .b { border:1px solid var(--border); border-radius:10px; padding:8px 10px; }
  .dl-stat .b .l { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; }
  .dl-stat .b .n { font-family:var(--font-brand); font-size:17px; font-weight:700; }
  .cost-tot { display:flex; justify-content:space-between; padding:8px 0; font-weight:700; border-top:2px solid var(--border); margin-top:2px; }
  .drawer .go { display:inline-block; margin-top:4px; font-size:11px; color:var(--brand-600); border:1px solid var(--border); border-radius:8px; padding:2px 8px; text-decoration:none; white-space:nowrap; }
  .drawer .go:hover { background:#eef2f8; }
  .exp-head { cursor:pointer; font-weight:600; }
  .exp-head .chev { display:inline-block; width:14px; color:var(--muted); transition:transform .15s; }
  .exp-cat.open .exp-head .chev { transform:rotate(90deg); }
  .exp-items { display:none; }
  .exp-cat.open .exp-items { display:block; }
  /* Named .dpnl- (not .pnl-) to avoid colliding with the waterfall bars above */
  .dpnl-row { display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--border); }
  .dpnl-row.strong { font-weight:700; border-bottom:2px solid var(--border); background:var(--cream-soft); margin:0 -8px; padding:9px 8px; border-radius:6px; }
  .dpnl-lbl { min-width:0; }
  .dpnl-pct { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right; }
  .dpnl-amt { font-variant-numeric:tabular-nums; white-space:nowrap; }
</style>

<div class="wrap">
  <div class="head">
    <button class="icon-btn" id="menuToggle" aria-label="Menu">☰</button>
    <h1 id="title">📊 Dashboard</h1>
    <div class="spacer"></div>

  </div>
  <p class="sub" id="subtitle">Business performance overview</p>

  <div class="mtd-strip" id="mtdStrip">
    <span class="dot"></span>
    <div class="item"><span class="lbl" id="mLabel">Month to Date</span><span class="val" id="mRevenue">–</span></div>
    <div class="item"><span class="lbl">Orders</span><span class="val" id="mOrders">–</span></div>
    <div class="item"><span class="lbl">Gross Profit</span><span class="val" id="mGross">–</span></div>
    <span class="foot" id="mFoot"></span>
  </div>

  <div class="mtd-strip" id="tvyStrip">
    <span class="dot" style="background:var(--brand);box-shadow:0 0 0 4px var(--cream-soft);"></span>
    <div class="item"><span class="lbl" id="tvyTodayLbl">Today</span><span class="val" id="tvyToday">–</span></div>
    <div class="item"><span class="lbl" id="tvyYestLbl">Yesterday</span><span class="val" id="tvyYesterday">–</span></div>
    <span class="foot" id="tvyFoot"></span>
  </div>

  <div class="status" id="status">⏳ Loading…</div>
  <div id="view" style="display:none"></div>
  <div class="panel" id="stockAlertsPanel" style="display:none;margin-top:16px;"></div>
</div>

<aside class="drawer" id="drill" aria-hidden="true">
  <div class="drawer-head">
    <button class="drawer-close" id="drillBack" aria-label="Back" style="display:none;margin-right:-4px;">←</button>
    <div><div class="drawer-title" id="drillTitle">—</div><div class="drawer-sub" id="drillSub"></div></div>
    <button class="drawer-close" id="drillClose" aria-label="Close">✕</button>
  </div>
  <div class="drawer-body" id="drillBody"></div>

<script src="/auth.js"></script>
  <script src="/pwa.js"></script>
<script src="/sidebar.js"></script>
<script>
  const A = requireRole(['admin','manager','staff']);
  const statusEl = document.getElementById('status');
  const viewEl = document.getElementById('view');
  if (!A || !A.id) { statusEl.innerHTML = '<span class="err">❌ Not logged in</span>'; throw Error('no auth'); }

  document.getElementById('who').textContent = `${A.name} · ${A.role}`;

  // ---- helpers ----
  const Rp = v => 'Rp ' + Math.round(v || 0).toLocaleString('id-ID');
  const RpShort = v => {
    const n = Math.abs(v || 0);
    const s = v < 0 ? '-' : '';
    if (n >= 1e9) return `${s}Rp ${(n/1e9).toFixed(1)} M`;
    if (n >= 1e6) return `${s}Rp ${(n/1e6).toFixed(1)} jt`;
    if (n >= 1e3) return `${s}Rp ${Math.round(n/1e3)} rb`;
    return `${s}Rp ${Math.round(n)}`;
  };
  const pct = (a, b) => b ? Math.round((a/b)*100) : 0;
  function deltaHTML(cur, prev, higherIsGood = true) {
    if (prev === 0 || prev == null) return `<span class="foot">no prior data</span>`;
    const change = Math.round((cur - prev) / Math.abs(prev) * 100);
    const good = higherIsGood ? change >= 0 : change <= 0;
    const arrow = change > 0 ? '▲' : (change < 0 ? '▼' : '–');
    return `<span class="delta ${good ? 'up' : 'down'}">${arrow} ${Math.abs(change)}% <span class="foot" style="font-weight:400">vs last mo.</span></span>`;
  }
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const jget = url => fetch(url, { headers: authHeaders(), credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : Promise.reject(new Error(`${url} → ${r.status}`)));

  // Month selector: populated from months that actually have data (server-side),
  // not the browser's clock — a client with clock drift would otherwise never
  // see the month its own sales are in (defaults to the most recent one).
  const monthSel = document.getElementById('month');
  async function fillMonths(){
    let months = [];
    try { months = await jget('/api/reports/available-months'); } catch {}
    if (!months.length) { const v = new Date().toISOString().slice(0,7); months = [{ value: v, label: v }]; }
    monthSel.innerHTML = '';
    months.forEach(m => { const o=document.createElement('option'); o.value=m.value; o.textContent=m.label; monthSel.appendChild(o); });
  }

  // Live month-to-date strip — cumulative from day 1 of the current month
  // through today, independent of whatever month is selected below. Compares
  // against the same day-of-month cutoff last month. Refreshes every 60s.
  async function loadMTD(){
    try {
      const m = await jget('/api/reports/mtd');
      document.getElementById('mLabel').textContent = `Month to Date (thru ${m.label})`;
      document.getElementById('mRevenue').innerHTML = Rp(m.revenue) + (m.delta_pct == null ? '' :
        ` <span class="delta ${m.delta_pct>=0?'up':'down'}">${m.delta_pct>=0?'▲':'▼'} ${Math.abs(m.delta_pct)}%</span>`);
      document.getElementById('mOrders').textContent = m.orders;
      document.getElementById('mGross').textContent = Rp(m.gross_profit) + ` (${m.margin_pct}%)`;
      document.getElementById('mFoot').textContent = m.last_order_at
        ? `${m.selling_days} selling day(s) · last order ${m.last_order_at.slice(11,16)}`
        : `${m.selling_days} selling day(s) · vs same point last month`;
    } catch {}
  }
  loadMTD();
  setInterval(loadMTD, 60000);

  // Today vs yesterday — the "is today going well right now" pulse, distinct
  // from MTD's month-long trajectory. Refreshes every 60s.
  async function loadTodayVsYesterday(){
    try {
      const d = await jget('/api/reports/today-vs-yesterday');
      document.getElementById('tvyTodayLbl').textContent = `Today (${d.today_label})`;
      document.getElementById('tvyYestLbl').textContent = `Yesterday (${d.yesterday_label})`;
      document.getElementById('tvyToday').innerHTML = Rp(d.today.revenue) + (d.delta_pct == null ? '' :
        ` <span class="delta ${d.delta_pct>=0?'up':'down'}">${d.delta_pct>=0?'▲':'▼'} ${Math.abs(d.delta_pct)}%</span>`);
      document.getElementById('tvyYesterday').textContent = Rp(d.yesterday.revenue);
      document.getElementById('tvyFoot').textContent = `${d.today.orders} orders today vs ${d.yesterday.orders} yesterday`;
    } catch {}
  }
  loadTodayVsYesterday();
  setInterval(loadTodayVsYesterday, 60000);

  // Stock alerts — low/out-of-stock ingredients + recent manual stock activity.
  // Lives outside #view (like MTD/Today-vs-Yesterday) so it stays visible and
  // independently refreshed regardless of the month filter. Reuses the same
  // Inventory page endpoints/thresholds — no new backend needed.
  const STOCK_UNIT_FALLBACK = { g: 200, ml: 500, pcs: 5, kg: 1, l: 1 };
  // Severity tiers combine stock status with whether the ingredient feeds a
  // top-10 seller — running out of something behind your best-sellers is a
  // bigger deal than running out of a rarely-used one, even if both are "Out".
  const HEAT_TIERS = {
    outCritical:  { cls:'t3', bg:'#8a2c22', label:'Out · top seller' },
    out:          { cls:'t2', bg:'var(--danger)', label:'Out of stock' },
    lowCritical:  { cls:'t1', bg:'#c9822b', label:'Low · top seller' },
    low:          { cls:'t0', bg:'#dba648', label:'Low stock' }
  };
  function severityOf(x) {
    if (x.isOut) return x.isCritical ? HEAT_TIERS.outCritical : HEAT_TIERS.out;
    return x.isCritical ? HEAT_TIERS.lowCritical : HEAT_TIERS.low;
  }
  // Cached so drillIngredient() can render instantly without a refetch.
  let stockClassified = [], stockMoves = [];

  async function loadStockAlerts(){
    const panel = document.getElementById('stockAlertsPanel');
    try {
      const [stock, moves, criticalMap] = await Promise.all([
        jget('/api/inventory/on-hand'),
        jget('/api/inventory/adjustments'),
        jget('/api/reports/critical-ingredients').catch(() => ({}))
      ]);
      const classified = (stock||[]).map(item => {
        const qty = Number(item.quantity_base||0);
        const min = item.min_stock > 0 ? Number(item.min_stock) : (STOCK_UNIT_FALLBACK[item.base_unit]||0);
        const isOut = qty <= 0, isLow = !isOut && min > 0 && qty < min;
        const criticalProducts = criticalMap[item.ingredient_id] ? [...new Set(criticalMap[item.ingredient_id])] : [];
        return { ...item, qty, isOut, isLow, isCritical: criticalProducts.length>0, criticalProducts };
      });
      stockClassified = classified; stockMoves = moves || [];
      // Sort by severity tier (worst first), critical items breaking ties within a tier.
      const tierRank = { t3:3, t2:2, t1:1, t0:0 };
      const alerts = classified.filter(x=>x.isOut||x.isLow)
        .sort((a,b)=> tierRank[severityOf(b).cls]-tierRank[severityOf(a).cls] || (a.qty-b.qty));

      const heatmapHTML = alerts.length ? `<div class="heat-grid">${alerts.map(x=>{
        const t = severityOf(x);
        const title = `${x.name}: ${x.qty}${x.base_unit||''} — ${t.label}` + (x.criticalProducts.length ? ` — used in: ${x.criticalProducts.join(', ')}` : '');
        return `<div class="heat-tile drill-link" data-act="ingredient" data-id="${x.ingredient_id}" style="background:${t.bg}" title="${esc(title)}">
          ${x.isCritical?'<span class="heat-badge">🔥</span>':''}
          <span class="heat-name">${esc(x.name)}</span>
          <span class="heat-qty">${x.qty}${esc(x.base_unit||'')}</span>
        </div>`;
      }).join('')}</div>`
        : `<div class="alert good" style="margin:0"><span class="ico">✅</span><span class="msg">All ingredients well stocked.</span></div>`;
      const alertsHTML = heatmapHTML + (alerts.some(x=>x.isCritical) ? '<div class="foot" style="margin-top:6px">🔥 = used in a top-10 selling product this month</div>' : '');

      const recent = (moves||[]).slice(0,6);
      const moveTypeLabel = m => m.type === 'opening' ? '📋 Opening' : (m.qty_base >= 0 ? '➕ Added' : '➖ Removed');
      const movesHTML = recent.length ? recent.map(m=>`
        <div class="dl-row"><span class="nm">${esc(m.ingredient_name||'')} <span class="foot">${moveTypeLabel(m)}</span></span>
        <span class="amt ${m.qty_base<0?'neg':'pos'}">${m.qty_base>0?'+':''}${m.qty_base}</span></div>`
      ).join('') : '<div class="foot">No recent adjustments.</div>';

      panel.innerHTML = `
        <h2>📦 Stock Alerts <span class="h-note">${alerts.length} ingredient(s) need attention</span></h2>
        ${alertsHTML}
        <h2 style="margin-top:16px;font-size:13px;">Recent stock activity</h2>
        ${movesHTML}
        <a class="go" href="/inventory.html" style="display:inline-block;margin-top:10px;">→ Open Inventory</a>`;
      panel.style.display = '';
    } catch { panel.style.display = 'none'; }
  }
  loadStockAlerts();

  const isOwner = A.role === 'admin';

  // ---- daily revenue chart (inline SVG, no libs) ----
  function dailyChart(days) {
    if (!days.length) return '<div class="pnl-foot">No sales recorded this month.</div>';
    const W = 640, H = 200, padL = 8, padB = 18, padT = 8;
    const max = Math.max(...days.map(d => d.revenue), 1);
    const bw = (W - padL) / days.length;
    const gridVals = [0.25, 0.5, 0.75, 1];
    let g = '';
    gridVals.forEach(gv => {
      const y = padT + (H - padT - padB) * (1 - gv);
      g += `<line class="grid" x1="${padL}" y1="${y}" x2="${W}" y2="${y}"/>`;
      g += `<text class="axis" x="0" y="${y - 2}">${RpShort(max * gv)}</text>`;
    });
    let bars = '';
    days.forEach((d, i) => {
      const h = (H - padT - padB) * (d.revenue / max);
      const x = padL + i * bw;
      const y = padT + (H - padT - padB) - h;
      const dow = new Date(d.date + 'T00:00').getDay();
      const wknd = (dow === 0 || dow === 6) ? ' weekend' : '';
      const day = d.date.slice(8);
      const label = (i % 3 === 0) ? `<text class="axis" x="${x + bw/2}" y="${H-4}" text-anchor="middle">${day}</text>` : '';
      bars += `<rect class="bar${wknd}" data-date="${d.date}" x="${x + 1}" y="${y}" width="${Math.max(bw-2,1)}" height="${Math.max(h,0)}" rx="2"><title>${d.date}: ${Rp(d.revenue)} · ${d.order_count} orders — click for orders</title></rect>${label}`;
    });
    return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${g}${bars}</svg>`;
  }

      <div class="bar-track"><div class="bar-fill ${cls} ${neg?'neg':''}" style="width:${Math.min(Math.abs(ratio),100)}%"></div></div>

  // ---- drill-down drawer (same pattern/endpoints as Analytics) ----

  function openDrawer(){ drill.classList.add('open'); drill.setAttribute('aria-hidden','false'); drillBackdrop.classList.add('open'); }

  document.getElementById('drillClose').addEventListener('click', closeDrawer);

  // Navigation history within the drawer — lets a drill-down go several levels
  // deep (e.g. Revenue → day → order) with a real Back step, not just Close.
  let drillStack = [], currentRender = null;
  function drillTo(renderFn, isTopLevel) {
    if (isTopLevel) drillStack = [];
    else if (currentRender) drillStack.push(currentRender);
    currentRender = renderFn;
    renderFn();
    drillBackBtn.style.display = drillStack.length ? '' : 'none';
  }
  function goBack() {
    const prev = drillStack.pop();
    if (!prev) return;
    currentRender = prev;
    prev();
    drillBackBtn.style.display = drillStack.length ? '' : 'none';
  }
  drillBackBtn.addEventListener('click', goBack);

  function barRow(name, amount, total, extra='') {
    const w = total > 0 ? Math.round(amount/total*100) : 0;
    return `<div class="dl-row"><span class="nm">${name}</span><div class="bar"><span style="width:${w}%"></span></div><span class="amt">${Rp(amount)}</span>${extra}</div>`;

  // delegated clicks for any drill-link or clickable product row (top products, drawer contents).
  // Clicks originating from INSIDE the drawer push onto the back-stack; clicks
  // from the main page (top products list) start a fresh top-level view.
  document.addEventListener('click', e => {
    const el = e.target.closest('.drill-link, .prod[data-act]'); if (!el) return;
    const isNested = !!el.closest('#drill');
    const act = el.getAttribute('data-act');
    let fn;
    if (act === 'day') fn = () => drillDay(el.getAttribute('data-date'));
    else if (act === 'product') fn = () => drillProduct(Number(el.getAttribute('data-id')));
    else if (act === 'orders') fn = () => drillProductOrders(Number(el.getAttribute('data-id')), el.getAttribute('data-name'));

    else if (act === 'ingredient') fn = () => drillIngredient(Number(el.getAttribute('data-id')));

  });

  function drillRevenue() {

    const top = products.slice().sort((a,b)=>b.revenue-a.revenue).slice(0,8); const prodTotal = products.reduce((s,p)=>s+p.revenue,0)||1;
    const payTotal = payData.reduce((s,p)=>s+p.revenue,0)||1;
    // Chronological (most recent first), not just top-by-revenue — this is the

    const days = (dailyData||[]).slice().sort((a,b)=>b.date.localeCompare(a.date)); const dayTotal = (dailyData||[]).reduce((s,d)=>s+d.revenue,0)||1;

      <h3>By day <span class="foot" style="text-transform:none;letter-spacing:0">— click a day for its orders</span></h3>

  }

  // Ingredient drawer — reached from a Stock Alert tile. Reuses the data
  // Dashboard already fetched for the heatmap (no extra request), and hands
  // off to Inventory/Purchase with the ingredient pre-selected so the target

  function drillIngredient(id) {
    openDrawer();
    const item = stockClassified.find(x => x.ingredient_id === id);
    if (!item) { drillTitle.textContent = 'Ingredient'; drillSub.textContent = ''; drillBody.innerHTML = '<div class="err">❌ Not found</div>'; return; }

    drillTitle.textContent = item.name;
    drillSub.textContent = `${item.category || '—'} · ${t.label}`;
    const min = item.min_stock > 0 ? Number(item.min_stock) : (STOCK_UNIT_FALLBACK[item.base_unit] || 0);
    const shortfall = Math.max(0, min - item.qty);
    const recentMoves = stockMoves.filter(m => m.ingredient_id === id).slice(0, 8);

  function drillPnl() {
    openDrawer();
    const c = (summary && summary.current) || {};
    const rev=c.revenue||0, cogs=c.cost||0, gross=rev-cogs, exp=c.expenses||0, net=rev-cogs-exp;
    const mp = n => rev>0 ? Math.round(n/rev*100) : 0;
    drillTitle.textContent = 'Profit & Loss'; drillSub.textContent = `${monthSel.value} · ${c.order_count||0} orders`;
    const line = (lbl,val,cls,act,strong) => `<div class="dpnl-row ${strong?'strong':''}">

    drillBody.innerHTML = '<div class="foot" style="margin-bottom:8px">Click Revenue, COGS, or Expenses to drill into each.</div>'

      + line('= Gross Profit', gross, gross<0?'neg':'pos', null, true)
      + line('− Operating expenses', exp, 'neg', 'expenses')
      + line('= Net Profit', net, net<0?'neg':'pos', null, true);
    drillBody.querySelectorAll('[data-pnl]').forEach(el=>el.addEventListener('click',()=>{
      const t = el.getAttribute('data-pnl');
      if (t==='revenue') drillTo(drillRevenue); else if (t==='cogs') drillTo(drillCogs); else if (t==='expenses') drillTo(drillExpenses);

  // Day drill-down: summary first (revenue/orders/top products/payment mix).
  // The raw order-by-order list stays collapsed behind an explicit toggle —
  // only fetched once (same request) but not shown until asked for, so the
  // default view answers "how did this day go", not a wall of transactions.
  async function drillDay(date) {
    openDrawer();
    drillTitle.textContent = date; drillSub.textContent = 'Loading…'; drillBody.innerHTML = '<div class="foot">Loading…</div>';
    try {
      const orders = await jget('/api/transactions?date=' + encodeURIComponent(date));
      if (!orders.length) { drillSub.textContent = ''; drillBody.innerHTML = '<div class="foot">No orders on this day</div>'; return; }
      const totalRev = orders.reduce((s,o)=>s+o.total,0);
      const itemCount = orders.reduce((s,o)=>s+o.items.reduce((si,it)=>si+it.quantity,0),0);
      drillSub.textContent = `${orders.length} orders · ${Rp(totalRev)}`;

      const prodMap = new Map(); // id -> {name, qty, revenue}
      const payMap = new Map(); // method -> {count, revenue}
      orders.forEach(o => {
        const pay = o.payment_method || 'unknown';
        const pv = payMap.get(pay) || { count: 0, revenue: 0 };
        pv.count++; pv.revenue += o.total; payMap.set(pay, pv);
        o.items.forEach(it => {
          const pid = it.product_id;
          const pv2 = prodMap.get(pid) || { name: it.product_name, qty: 0, revenue: 0 };
          pv2.qty += it.quantity; pv2.revenue += it.line_total; prodMap.set(pid, pv2);
        });
      });
      const topProducts = [...prodMap.entries()].sort((a,b)=>b[1].revenue-a[1].revenue).slice(0,8);
      const prodTotal = [...prodMap.values()].reduce((s,v)=>s+v.revenue,0)||1;
      const payTotal = [...payMap.values()].reduce((s,v)=>s+v.revenue,0)||1;

      const ordersTable = `<table><thead><tr><th>Order</th><th>Items</th><th class="num">Total</th><th>Pay</th></tr></thead><tbody>${
        orders.map(o=>`<tr><td><span class="drill-link" data-act="order" data-id="${o.id}">#${o.id}</span></td><td>${o.items.map(it=>`${esc(it.product_name||'?')}×${it.quantity}`).join(', ')}</td><td class="num">${Rp(o.total)}</td><td><span class="pill">${esc(o.payment_method||'—')}</span></td></tr>`).join('')
      }</tbody></table>`;

      drillBody.innerHTML = `
        <div class="dl-stat">
          <div class="b"><div class="l">Revenue</div><div class="n">${Rp(totalRev)}</div></div>
          <div class="b"><div class="l">Orders</div><div class="n">${orders.length}</div></div>
          <div class="b"><div class="l">Items sold</div><div class="n">${itemCount}</div></div>
        </div>
        <h3>Top products</h3>
        ${topProducts.map(([id,v])=>`<div class="dl-row"><span class="nm"><span class="drill-link" data-act="product" data-id="${id}">${esc(v.name||'?')}</span> <span class="foot">${v.qty}×</span></span><div class="bar"><span style="width:${Math.round(v.revenue/prodTotal*100)}%"></span></div><span class="amt">${Rp(v.revenue)}</span></div>`).join('')}
        <h3>Payment mix</h3>
        ${[...payMap.entries()].sort((a,b)=>b[1].revenue-a[1].revenue).map(([m,v])=>`<div class="dl-row"><span class="nm">${esc(m.toUpperCase())} <span class="foot">${v.count}×</span></span><div class="bar"><span style="width:${Math.round(v.revenue/payTotal*100)}%"></span></div><span class="amt">${Rp(v.revenue)}</span></div>`).join('')}
        <div class="exp-cat">
          <div class="dl-row exp-head"><span class="nm"><span class="chev">▸</span> View ${orders.length} individual order(s)</span></div>
          <div class="exp-items">${ordersTable}</div>
        </div>`;
      drillBody.querySelectorAll('.exp-head').forEach(h=>h.addEventListener('click',()=>h.parentNode.classList.toggle('open')));
    } catch(e) { drillBody.innerHTML = '<div class="err">❌ ' + esc(e.message) + '</div>'; }
  }
  document.addEventListener('click', e => {
    const bar = e.target.closest('rect.bar[data-date]'); if (!bar) return;
    drillTo(() => drillDay(bar.getAttribute('data-date')), true);
  });

  // ---- owner view ----
  async function loadOwner(month) {
    const [sum, days, top, recipes, inv, prod, pay] = await Promise.all([
      jget('/api/reports/monthly-summary?month=' + month),
      jget('/api/reports/daily?month=' + month).catch(() => []),
      jget('/api/reports/top-products?month=' + month).catch(() => []),
      jget('/api/reports/recipe-costing').catch(() => []),
      jget('/api/reports/inventory-valuation').catch(() => []),
      jget('/api/reports/product-sales?month=' + month).catch(() => []),
      jget('/api/reports/payment-mix?month=' + month).catch(() => [])
    ]);
    const c = sum.current, p = sum.previous;
    const grossCur = c.revenue - c.cost, grossPrev = p.revenue - p.cost;

    // cache for drill-downs
    summary = sum; products = prod || []; payData = pay || []; dailyData = days || [];

    // KPI hero — each card opens a drill-down with the underlying detail
    const kpis = `<div class="kpis">
      <div class="kpi hero clickable" id="revKpi">
        <div class="lbl">Revenue</div><div class="val">${Rp(c.revenue)}</div>
        ${deltaHTML(c.revenue, p.revenue, true)}
        <div class="foot">${c.order_count} orders</div>
        <div class="drill-hint">click to see where it came from →</div>
      </div>
      <div class="kpi clickable" id="grossKpi">
        <div class="lbl">Gross Profit</div><div class="val ${grossCur<0?'neg':''}">${Rp(grossCur)}</div>
        ${deltaHTML(grossCur, grossPrev, true)}
        <div class="foot">after COGS ${Rp(c.cost)}</div>
        <div class="drill-hint">what makes up COGS →</div>
      </div>
      <div class="kpi clickable" id="expKpi">
        <div class="lbl">Expenses</div><div class="val">${Rp(c.expenses)}</div>
        ${deltaHTML(c.expenses, p.expenses, false)}
        <div class="foot">${pct(c.expenses, c.revenue)}% of revenue</div>
        <div class="drill-hint">expenses by category →</div>
      </div>
      <div class="kpi hero clickable" id="netKpi">
        <div class="lbl">Net Profit</div><div class="val ${c.profit<0?'neg':''}">${Rp(c.profit)}</div>
        ${deltaHTML(c.profit, p.profit, true)}
        <div class="foot">${c.profit<0?'operating at a loss':'net positive'}</div>
        <div class="drill-hint">full P&amp;L statement →</div>
      </div>
      <div class="kpi clickable" id="marginKpi">
        <div class="lbl">Net Margin</div><div class="val ${c.margin_pct<0?'neg':''}">${c.margin_pct}%</div>
        ${deltaHTML(c.margin_pct, p.margin_pct, true)}
        <div class="foot">avg order ${Rp(c.order_count? c.revenue/c.order_count:0)}</div>
        <div class="drill-hint">full P&amp;L statement →</div>
      </div>
    </div>`;

    // chart + P&L
    const rev = c.revenue || 1;
    const mid = `<div class="grid2">
      <div class="panel">
        <h2>Daily Revenue <span class="h-note">— weekends darker</span></h2>
        ${dailyChart(days)}
      </div>
      <div class="panel">
        <h2>Where the money goes</h2>
        ${pnlRow('Revenue', c.revenue, 100, 'rev')}
        ${pnlRow('− Cost of goods (COGS)', c.cost, c.cost/rev*100, 'cogs', pct(c.cost,c.revenue)+'% of revenue')}
        ${pnlRow('− Operating expenses', c.expenses, c.expenses/rev*100, 'exp', pct(c.expenses,c.revenue)+'% of revenue')}
        ${pnlRow('= Net profit', c.profit, c.profit/rev*100, 'net', pct(c.profit,c.revenue)+'% margin')}
      </div>
    </div>`;

    // top products
    const topMax = Math.max(...top.map(t => t.revenue), 1);
    const topHTML = top.length ? top.map((t, i) => `
      <div class="prod clickable" data-act="product" data-id="${t.id}">
        <span class="rank">${i+1}</span>
        <span class="pname" title="${esc(t.name)}">${esc(t.name)}</span>
        <span class="pbar"><span style="width:${t.revenue/topMax*100}%"></span></span>
        <span class="pval">${RpShort(t.revenue)} · ${t.qty}×</span>
      </div>`).join('') : '<div class="pnl-foot">No sales this month.</div>';

    // alerts
    const lowStock = inv.filter(x => x.min_stock > 0 && x.quantity_base < x.min_stock);
    const belowCost = recipes.filter(x => x.price > 0 && x.recipe_count > 0 && x.margin_pct < 0);
    const invValue = inv.reduce((s, x) => s + (x.total_value || 0), 0);
    let alerts = '';
    if (c.profit < 0)
      alerts += `<div class="alert warn"><span class="ico">🔴</span><span class="msg"><b>Net loss this month.</b> Expenses (${Rp(c.expenses)}) exceed gross profit (${Rp(grossCur)}). Review the biggest expense lines.</span></div>`;
    if (belowCost.length)
      alerts += `<div class="alert warn"><span class="ico">⚠️</span><span class="msg"><b>${belowCost.length} menu item(s) sold below cost.</b> ${belowCost.slice(0,3).map(x=>esc(x.name)).join(', ')}${belowCost.length>3?'…':''}</span></div>`;
    if (lowStock.length)
      alerts += `<div class="alert info"><span class="ico">📦</span><span class="msg"><b>${lowStock.length} ingredient(s) below minimum stock.</b> ${lowStock.slice(0,3).map(x=>esc(x.name)).join(', ')}${lowStock.length>3?'…':''} — time to reorder.</span></div>`;
    const hasWarn = (c.profit < 0) || belowCost.length > 0;
    if (!hasWarn)
      alerts = `<div class="alert good"><span class="ico">✅</span><span class="msg"><b>All healthy.</b> Profitable month, no items below cost.</span></div>` + alerts;
    alerts += `<div class="alert info"><span class="ico">🏷️</span><span class="msg"><b>${Rp(invValue)}</b> of cash is tied up in ingredient stock (${inv.length} items).</span></div>`;

    const bottom = `<div class="grid2b">
      <div class="panel"><h2>Top 5 Products <span class="h-note">by revenue</span></h2>${topHTML}</div>
      <div class="panel"><h2>Needs attention</h2>${alerts}</div>
    </div>`;

    viewEl.innerHTML = kpis + mid + bottom;

    // wire KPI drill-downs (elements just created above)
    document.getElementById('revKpi').addEventListener('click', () => drillTo(drillRevenue, true));
    document.getElementById('grossKpi').addEventListener('click', () => drillTo(drillCogs, true));
    document.getElementById('expKpi').addEventListener('click', () => drillTo(drillExpenses, true));
    document.getElementById('netKpi').addEventListener('click', () => drillTo(drillPnl, true));
    document.getElementById('marginKpi').addEventListener('click', () => drillTo(drillPnl, true));
  }

  // ---- simple view (manager / staff) ----
  async function loadSimple(month) {
    const h = await jget('/api/reports/monthly?month=' + month);
    const p = (h.revenue||0) - (h.cogs||0) - (h.expenses||0);
    viewEl.innerHTML = `<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi hero"><div class="lbl">Revenue</div><div class="val">${Rp(h.revenue)}</div><div class="foot">${h.order_count||0} orders</div></div>
      <div class="kpi"><div class="lbl">COGS</div><div class="val">${Rp(h.cogs)}</div><div class="foot">${pct(h.cogs,h.revenue)}% of revenue</div></div>
      <div class="kpi"><div class="lbl">Expenses</div><div class="val">${Rp(h.expenses)}</div></div>
      <div class="kpi hero"><div class="lbl">Net Profit</div><div class="val ${p<0?'neg':''}">${Rp(p)}</div><div class="foot">${pct(p,h.revenue)}% margin</div></div>
    </div>`;
  }

  async function load() {
    const month = monthSel.value;
    statusEl.style.display = '';
    viewEl.style.display = 'none';
    statusEl.textContent = '⏳ Loading…';
    try {
      if (isOwner) await loadOwner(month);
      else await loadSimple(month);
      statusEl.style.display = 'none';
      viewEl.style.display = '';
    } catch (e) {
      statusEl.innerHTML = '<span class="err">❌ ' + esc(e.message) + '</span>';
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  monthSel.addEventListener('change', load);
  fillMonths().then(load);
</script>
</body>
</html>
