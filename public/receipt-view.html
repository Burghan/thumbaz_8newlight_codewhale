<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Receipt — 8 NewLight Coffee</title>
<link rel="stylesheet" href="/theme.css"/>
<style>
  body { margin:0; padding:24px 16px; display:flex; justify-content:center; background:var(--cream, #f4efe4); color:var(--ink); }
  .card { width:100%; max-width:380px; background:#fff; border-radius:18px; box-shadow:0 20px 45px rgba(46,72,100,.14); padding:22px 20px; }
  .brand { text-align:center; margin-bottom:14px; }
  .brand img { width:48px; height:48px; border-radius:12px; object-fit:cover; }
  .brand .name { font-family:var(--font-brand); font-weight:700; font-size:16px; color:var(--brand-ink); margin-top:6px; }
  h1 { text-align:center; font-size:15px; margin:0 0 4px; color:var(--brand-ink); }
  .meta { text-align:center; font-size:12px; color:var(--muted); margin-bottom:14px; }
  .items { border-top:1px dashed var(--border); border-bottom:1px dashed var(--border); padding:10px 0; margin-bottom:12px; }
  .item-row { display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:4px 0; }
  .item-row .name { color:var(--ink); }
  .item-row .qty { color:var(--muted); }
  .totals-row { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .totals-row.grand { font-size:16px; font-weight:700; color:var(--brand-ink); margin-top:6px; border-top:1px solid var(--border); padding-top:8px; }
  .status { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
  .err { color:var(--danger); }
  .footer-note { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }
  .share-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:16px; padding:12px; border:none; border-radius:12px; background:#25d366; color:#fff; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .share-btn:hover { background:#1ebe5b; }
  .share-btn svg { width:18px; height:18px; flex:0 0 auto; }
  .share-btn:disabled { opacity:.6; cursor:default; }
  .share-note { text-align:center; font-size:11px; color:var(--muted); margin-top:8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/newlight-logo.jpeg" alt="8 NewLight Coffee"/>
      <div class="name">8 NewLight Coffee</div>
    </div>
    <div id="content" class="status">Loading receipt…</div>
    <button id="shareWa" class="share-btn" style="display:none;" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.5 14.4c-.3-.1-1.7-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.4-1.5-.9-.8-1.5-1.8-1.6-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.3-.4.1-.2 0-.4 0-.5s-.7-1.7-1-2.3c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.2 3.4 5.4 4.7.7.3 1.3.5 1.8.7.7.2 1.4.2 1.9.1.6-.1 1.7-.7 2-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5-1.3c1.4.8 3.1 1.2 4.9 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.3c-1.6 0-3.2-.4-4.5-1.2l-.3-.2-3 .8.8-2.9-.2-.3C4.1 15 3.6 13.5 3.6 12 3.6 7.4 7.4 3.6 12 3.6S20.4 7.4 20.4 12 16.6 20.3 12 20.3z"/></svg>
      Share Receipt Image
    </button>
    <div id="shareNote" class="share-note" style="display:none;"></div>
  </div>
<script>
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const Rp = (v) => 'Rp ' + Math.round(v || 0).toLocaleString('id-ID');

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const token = params.get('t');
  const content = document.getElementById('content');

  async function load() {
    if (!id || !token) {
      content.innerHTML = '<div class="err">This receipt link is incomplete.</div>';
      return;
    }
    try {
      const res = await fetch(`/api/public-receipt/${encodeURIComponent(id)}?t=${encodeURIComponent(token)}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Receipt not found');
      render(data);
    } catch (e) {
      content.innerHTML = `<div class="err">❌ ${esc(e.message)}</div>`;
    }
  }

  function render(o) {
    const date = o.transacted_at ? new Date(o.transacted_at.replace(' ', 'T')).toLocaleString('id-ID') : '';
    content.className = '';
    content.innerHTML = `
      <h1>Receipt #${o.id}</h1>
      <div class="meta">${esc(date)}</div>
      ${o.cashier_name ? `<div class="meta">Served by: ${esc(o.cashier_name)}</div>` : ''}
      ${o.order_type ? `<div class="meta">Order Type: ${esc(o.order_type)}</div>` : ''}
      ${o.customer_name ? `<div class="meta">${esc(o.customer_name)}</div>` : ''}
      <div class="items">
        ${o.items.map((it) => `
          <div class="item-row">
            <span class="name">${it.quantity}× ${esc(it.name)}</span>
            <span>${Rp(it.total)}</span>
          </div>
        `).join('')}
      </div>
      <div class="totals-row"><span>Subtotal</span><span>${Rp(o.subtotal)}</span></div>
      ${o.tax ? `<div class="totals-row"><span>Tax</span><span>${Rp(o.tax)}</span></div>` : ''}
      <div class="totals-row grand"><span>Total</span><span>${Rp(o.total)}</span></div>
      <div class="footer-note">Thank you for visiting 8 NewLight Coffee!</div>
    `;

    const shareBtn = document.getElementById('shareWa');
    const shareNote = document.getElementById('shareNote');
    shareBtn.style.display = '';
    shareBtn.onclick = () => shareReceiptImage(o, date, shareBtn, shareNote);
  }

  function loadImage(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  // Captures the ACTUAL rendered card (real CSS text rendering, not a
  // hand-drawn copy) by embedding a clone of it inside an SVG <foreignObject>
  // and drawing that to a canvas — the browser renders the HTML/CSS exactly
  // as it does on screen, so the result looks identical to the page instead
  // of a redrawn approximation (a plain <canvas> fillText() call can never
  // match real font rendering, no matter how high its resolution is).
  async function domToImageCanvas(el, scale) {
    const rect = el.getBoundingClientRect();
    const width = Math.ceil(rect.width);
    const height = Math.ceil(rect.height);

    const clone = el.cloneNode(true);
    clone.querySelectorAll('#shareWa, #shareNote').forEach((n) => n.remove());
    clone.querySelectorAll('img').forEach((img) => {
      img.setAttribute('src', new URL(img.getAttribute('src'), location.href).href);
    });

    let css = '';
    for (const sheet of document.styleSheets) {
      try {
        for (const rule of sheet.cssRules) css += rule.cssText + '\n';
      } catch (e) { /* cross-origin sheet — skip, none expected here */ }
    }

    // A real <html>/<body> (not a bare <div>) so :root custom properties
    // (--brand-ink etc., defined in theme.css) actually resolve inside this
    // embedded sub-document.
    const svgMarkup = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <html xmlns="http://www.w3.org/1999/xhtml">
          <head><style>${css}</style></head>
          <body style="margin:0;">
            <div style="width:${width}px;">${clone.outerHTML}</div>
          </body>
        </html>
      </foreignObject>
    </svg>`;

    const svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    try {
      const img = await loadImage(url);
      if (!img || !img.width) throw new Error('Could not rasterize the receipt card');
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      return canvas;
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  // Fallback only — used if the browser can't rasterize the SVG capture
  // above (older/unusual browsers). Draws the receipt onto a canvas by hand
  // so sharing still produces *something*, just not a pixel-perfect copy.
  async function renderReceiptCanvas(o, dateStr) {
    const width = 380;
    const margin = 20;
    // Rendered well above 1:1 CSS pixels for two stacked reasons: a plain
    // 380px canvas looks blurry on a 2x/3x-density phone screen to begin
    // with, AND WhatsApp itself re-compresses images sent as a "photo"
    // attachment (its own lossy step we can't opt out of via the Web Share
    // API) — oversupplying resolution is the only lever against both. All
    // the drawing math below stays in the original logical (1x) coordinate
    // space; ctx.scale() does the work.
    const scale = 4;
    const logo = await loadImage('/newlight-logo.jpeg');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '13px sans-serif';

    // Measure total height first (dry pass over the same layout logic).
    let y = 24;
    y += 56 + 10; // logo + name
    y += 20; // "Receipt #N"
    y += 18; // date
    if (o.cashier_name) y += 16;
    if (o.order_type) y += 16;
    if (o.customer_name) y += 16;
    y += 10; // top rule
    y += o.items.length * 22;
    y += 10; // bottom rule
    y += 22; // subtotal
    if (o.tax) y += 22;
    y += 28; // total
    y += 30; // footer
    const height = y + margin;
    canvas.width = width * scale;
    canvas.height = height * scale;
    ctx.scale(scale, scale);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, width, height);
    ctx.textBaseline = 'top';

    y = 24;
    if (logo) { ctx.drawImage(logo, (width - 56) / 2, y, 56, 56); y += 62; }
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2e4864';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('8 NewLight Coffee', width / 2, y); y += 24;

    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(`Receipt #${o.id}`, width / 2, y); y += 20;
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8a93a3';
    ctx.fillText(dateStr, width / 2, y); y += 18;
    if (o.cashier_name) { ctx.fillText(`Served by: ${o.cashier_name}`, width / 2, y); y += 16; }
    if (o.order_type) { ctx.fillText(`Order Type: ${o.order_type}`, width / 2, y); y += 16; }
    if (o.customer_name) { ctx.fillText(o.customer_name, width / 2, y); y += 16; }

    y += 6;
    ctx.strokeStyle = '#e7e1d4';
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(width - margin, y); ctx.stroke();
    y += 10;

    ctx.font = '13px sans-serif';
    o.items.forEach((it) => {
      ctx.textAlign = 'left';
      ctx.fillStyle = '#2e4864';
      ctx.fillText(`${it.quantity}× ${it.name}`, margin, y);
      ctx.textAlign = 'right';
      ctx.fillText(Rp(it.total), width - margin, y);
      y += 22;
    });

    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(width - margin, y); ctx.stroke();
    y += 10;

    const row = (label, value, bold) => {
      ctx.font = (bold ? 'bold 16px' : '13px') + ' sans-serif';
      ctx.fillStyle = bold ? '#2e4864' : '#2e4864';
      ctx.textAlign = 'left'; ctx.fillText(label, margin, y);
      ctx.textAlign = 'right'; ctx.fillText(value, width - margin, y);
      y += bold ? 28 : 22;
    };
    row('Subtotal', Rp(o.subtotal), false);
    if (o.tax) row('Tax', Rp(o.tax), false);
    row('Total', Rp(o.total), true);

    ctx.textAlign = 'center';
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8a93a3';
    ctx.fillText('Thank you for visiting 8 NewLight Coffee!', width / 2, y);

    return canvas;
  }

  async function shareReceiptImage(o, dateStr, btn, note) {
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = 'Preparing image…';
    note.style.display = 'none';
    try {
      let canvas;
      try {
        // 3x on top of the card's real CSS size — real text at that scale,
        // not a redrawn approximation, so this should look identical to the
        // on-screen receipt instead of just "less blurry."
        canvas = await domToImageCanvas(document.querySelector('.card'), 3);
      } catch (domErr) {
        canvas = await renderReceiptCanvas(o, dateStr); // hand-drawn fallback
      }
      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob((b) => (b ? resolve(b) : reject(new Error('Image export failed'))), 'image/png');
      });
      const file = new File([blob], `receipt-${o.id}.png`, { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], text: `My receipt from 8 NewLight Coffee — ${Rp(o.total)}` });
      } else {
        // No file-sharing support (older/desktop browsers) — download the
        // image instead so it can still be attached to WhatsApp manually.
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `receipt-${o.id}.png`;
        a.click();
        note.style.display = '';
        note.textContent = 'Image downloaded — attach it to WhatsApp manually (this browser can\'t share files directly).';
      }
    } catch (e) {
      if (e && e.name !== 'AbortError') {
        note.style.display = '';
        note.textContent = 'Could not prepare the image: ' + (e.message || 'unknown error');
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }

  load();
</script>
</body>
</html>
