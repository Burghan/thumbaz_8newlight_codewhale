<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Receipt — 8 NewLight Coffee</title>
<link rel="stylesheet" href="/theme.css"/>
<style>
  body { margin:0; padding:24px 16px; display:flex; justify-content:center; background:var(--cream, #f4efe4); color:var(--ink); }
  .card { width:100%; max-width:380px; background:#fff; border-radius:18px; box-shadow:0 20px 45px rgba(46,72,100,.14); padding:22px 20px; }
  .brand { text-align:center; margin-bottom:14px; }
  .brand img { width:48px; height:48px; border-radius:12px; object-fit:cover; }
  .brand .name { font-family:var(--font-brand); font-weight:700; font-size:16px; color:var(--brand-ink); margin-top:6px; }
  h1 { text-align:center; font-size:15px; margin:0 0 4px; color:var(--brand-ink); }
  .meta { text-align:center; font-size:12px; color:var(--muted); margin-bottom:14px; }
  .items { border-top:1px dashed var(--border); border-bottom:1px dashed var(--border); padding:10px 0; margin-bottom:12px; }
  .item-row { display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:4px 0; }
  .item-row .name { color:var(--ink); }
  .item-row .qty { color:var(--muted); }
  .totals-row { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .totals-row.grand { font-size:16px; font-weight:700; color:var(--brand-ink); margin-top:6px; border-top:1px solid var(--border); padding-top:8px; }
  .status { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
  .err { color:var(--danger); }
  .footer-note { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }
  .share-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:16px; padding:12px; border:none; border-radius:12px; background:#25d366; color:#fff; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .share-btn:hover { background:#1ebe5b; }
  .share-btn svg { width:18px; height:18px; flex:0 0 auto; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/newlight-logo.jpeg" alt="8 NewLight Coffee"/>
      <div class="name">8 NewLight Coffee</div>
    </div>
    <div id="content" class="status">Loading receipt…</div>
    <button id="shareWa" class="share-btn" style="display:none;" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.5 14.4c-.3-.1-1.7-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.4-1.5-.9-.8-1.5-1.8-1.6-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.3-.4.1-.2 0-.4 0-.5s-.7-1.7-1-2.3c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.2 3.4 5.4 4.7.7.3 1.3.5 1.8.7.7.2 1.4.2 1.9.1.6-.1 1.7-.7 2-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5-1.3c1.4.8 3.1 1.2 4.9 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.3c-1.6 0-3.2-.4-4.5-1.2l-.3-.2-3 .8.8-2.9-.2-.3C4.1 15 3.6 13.5 3.6 12 3.6 7.4 7.4 3.6 12 3.6S20.4 7.4 20.4 12 16.6 20.3 12 20.3z"/></svg>
      Share via WhatsApp
    </button>
  </div>
<script>
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const Rp = (v) => 'Rp ' + Math.round(v || 0).toLocaleString('id-ID');

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const token = params.get('t');
  const content = document.getElementById('content');

  async function load() {
    if (!id || !token) {
      content.innerHTML = '<div class="err">This receipt link is incomplete.</div>';
      return;
    }
    try {
      const res = await fetch(`/api/public-receipt/${encodeURIComponent(id)}?t=${encodeURIComponent(token)}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Receipt not found');
      render(data);
    } catch (e) {
      content.innerHTML = `<div class="err">❌ ${esc(e.message)}</div>`;
    }
  }

  function render(o) {
    const date = o.transacted_at ? new Date(o.transacted_at.replace(' ', 'T')).toLocaleString('id-ID') : '';
    content.className = '';
    content.innerHTML = `
      <h1>Receipt #${o.id}</h1>
      <div class="meta">${esc(date)}${o.order_type ? ' · ' + esc(o.order_type) : ''}</div>
      ${o.customer_name ? `<div class="meta">${esc(o.customer_name)}</div>` : ''}
      <div class="items">
        ${o.items.map((it) => `
          <div class="item-row">
            <span class="name">${it.quantity}× ${esc(it.name)}</span>
            <span>${Rp(it.total)}</span>
          </div>
        `).join('')}
      </div>
      <div class="totals-row"><span>Subtotal</span><span>${Rp(o.subtotal)}</span></div>
      ${o.tax ? `<div class="totals-row"><span>Tax</span><span>${Rp(o.tax)}</span></div>` : ''}
      <div class="totals-row grand"><span>Total</span><span>${Rp(o.total)}</span></div>
      <div class="footer-note">Thank you for visiting 8 NewLight Coffee!</div>
    `;

    const shareBtn = document.getElementById('shareWa');
    shareBtn.style.display = '';
    shareBtn.onclick = () => {
      const text = `My receipt from 8 NewLight Coffee — ${Rp(o.total)}\n${location.href}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
    };
  }

  load();
</script>
</body>
</html>
