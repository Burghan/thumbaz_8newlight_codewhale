<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Kitchen — 8 NewLight Coffee</title>
  <link rel="stylesheet" href="/sidebar.css" />
  <link rel="stylesheet" href="/theme.css" />
  <style>
    body { font-family: var(--font-ui); margin: 0; padding: 0; background: var(--cream); color: var(--ink); }
    .content { display: flex; flex-direction: column; height: 100vh; overflow: hidden; box-sizing: border-box; padding: 18px 22px; }
    .topbar { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .topbar h1 { margin: 0; flex: 1; font-size: 20px; font-family: var(--font-brand); color: var(--brand-ink); }
    .page-sub { color: var(--muted); font-size: 14px; margin: 2px 0 14px; flex: 0 0 auto; }

    .stats { flex: 0 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    @media(max-width:760px){ .stats { grid-template-columns: repeat(2,1fr); } }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; box-shadow: var(--shadow-sm); }
    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .stat .value { font-family: var(--font-brand); font-size: 26px; font-weight: 700; color: var(--brand-ink); margin-top: 2px; }
    .stat.new .value { color: var(--danger); }
    .stat.preparing .value { color: #c98a2b; }
    .stat.ready .value { color: var(--positive); }

    .board { flex: 1 1 auto; min-height: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; overflow: hidden; }
    @media(max-width:900px){ .board { grid-template-columns: 1fr; overflow-y: auto; } }

    .column { display: flex; flex-direction: column; min-height: 0; background: var(--card-tint, #f4f1ea); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .column-head { padding: 12px 14px; font-weight: 700; font-family: var(--font-brand); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .column-head .count { font-size: 12px; font-weight: 600; color: var(--muted); background: var(--card); border-radius: 999px; padding: 2px 9px; }
    .column.new .column-head { color: var(--danger); }
    .column.preparing .column-head { color: #c98a2b; }
    .column.ready .column-head { color: var(--positive); }
    .column-list { flex: 1 1 auto; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
    .column-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 8px; }

    .ticket { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: var(--shadow-sm); }
    .ticket-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 6px; }
    .ticket-label { font-weight: 700; }
    .ticket-elapsed { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
    .ticket-elapsed.ok { background: rgba(94,143,115,0.15); color: var(--positive); }
    .ticket-elapsed.warn { background: rgba(201,138,43,0.15); color: #8a5a10; }
    .ticket-elapsed.late { background: var(--danger-bg); color: var(--danger); }
    .ticket-type { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
    .ticket-items { display: grid; gap: 4px; margin-bottom: 10px; font-size: 13px; }
    .ticket-item { display: flex; justify-content: space-between; gap: 8px; }
    .ticket-item .note { color: var(--muted); font-size: 11px; font-style: italic; }
    .ticket-actions { display: flex; gap: 8px; }
    .ticket-actions button { flex: 1; padding: 9px; border-radius: 9px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; }
    .btn-advance { background: var(--brand); color: #fff; }
    .btn-advance:hover { background: var(--brand-700); }
    .btn-cancel { background: transparent; border: 1px solid var(--border) !important; color: var(--muted); flex: 0 0 auto !important; padding: 9px 12px !important; }
    .btn-cancel:hover { color: var(--danger); border-color: var(--danger) !important; }
    /* Shortcut for New/Preparing tickets — skips Ready straight to Served,
       since this board isn't run as a real multi-stage kitchen queue today. */
    .btn-serve { background: transparent; border: 1px solid #2e9d5b !important; color: #2e9d5b; flex: 0 0 auto !important; padding: 9px 12px !important; }
    .btn-serve:hover { background: #2e9d5b; color: #fff; }

    .sync-note { flex: 0 0 auto; margin-top: 10px; font-size: 12px; color: var(--muted); text-align: center; }

    .confirm-backdrop { position: fixed; inset: 0; background: rgba(20,28,45,.45); display: none; align-items: center; justify-content: center; z-index: 80; }
    .confirm-backdrop.open { display: flex; }
    .confirm-card { background: var(--card); border-radius: 16px; padding: 20px; width: min(340px, 90vw); box-shadow: 0 24px 64px rgba(0,0,0,.28); }
    .confirm-card h3 { margin: 0 0 8px; font-family: var(--font-brand); color: var(--brand-ink); }
    .confirm-card p { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
    .confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .confirm-actions button { padding: 10px; border-radius: 10px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; font-size: 14px; }
    .confirm-actions .confirm-yes { background: var(--danger); border-color: var(--danger); color: #fff; }
    .confirm-actions .confirm-no { background: var(--card); color: var(--ink); }
  </style>
</head>
<body class="theme-cafe">
  <button class="menu-toggle" id="menuToggle">☰ Menu</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-logo" aria-hidden="true"><img src="/newlight-logo.jpeg" alt="8 NewLight Coffee" /></span><div class="brand-text"><div class="brand-title">8 NewLight Coffee</div><div class="brand-subtitle">Navigation</div></div></div>
  </aside>

  <div class="content">
    <div class="topbar">
      <h1>🔔 Kitchen</h1>
    </div>
    <div class="page-sub">Live barista queue — tickets sent from the New POS's "Send to Bar".</div>

    <div class="stats">
      <div class="stat new"><div class="label">New</div><div class="value" id="statNew">–</div></div>
      <div class="stat preparing"><div class="label">Preparing</div><div class="value" id="statPreparing">–</div></div>
      <div class="stat ready"><div class="label">Ready</div><div class="value" id="statReady">–</div></div>
      <div class="stat"><div class="label">Served today</div><div class="value" id="statServed">–</div></div>
    </div>

    <div class="board">
      <div class="column new">
        <div class="column-head"><span>New</span><span class="count" id="countNew">0</span></div>
        <div class="column-list" id="listNew"></div>
      </div>
      <div class="column preparing">
        <div class="column-head"><span>Preparing</span><span class="count" id="countPreparing">0</span></div>
        <div class="column-list" id="listPreparing"></div>
      </div>
      <div class="column ready">
        <div class="column-head"><span>Ready</span><span class="count" id="countReady">0</span></div>
        <div class="column-list" id="listReady"></div>
      </div>
    </div>
    <div class="sync-note" id="syncNote">Loading…</div>
  </div>

  <div class="confirm-backdrop" id="confirmBackdrop">
    <div class="confirm-card">
      <h3>Cancel this ticket?</h3>
      <p>It drops off the board and won't be prepared.</p>
      <div class="confirm-actions">
        <button class="confirm-no" id="confirmNo" type="button">No, keep it</button>
        <button class="confirm-yes" id="confirmYes" type="button">Yes, cancel it</button>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script src="/sidebar.js"></script>
  <script>
    const auth = requireRole(['admin', 'manager', 'staff']);

    const NEXT_STATUS = { new: 'preparing', preparing: 'ready', ready: 'served' };
    const ACTION_LABEL = { new: 'Start', preparing: 'Ready', ready: 'Served' };

    function elapsedMinutes(createdAt) {
      const created = new Date(createdAt.replace(' ', 'T') + 'Z');
      return Math.max(0, Math.round((Date.now() - created.getTime()) / 60000));
    }

    function elapsedClass(mins) {
      if (mins >= 8) return 'late';
      if (mins >= 4) return 'warn';
      return 'ok';
    }

    function renderColumn(status, tickets) {
      const list = document.getElementById(`list${status[0].toUpperCase()}${status.slice(1)}`);
      const count = document.getElementById(`count${status[0].toUpperCase()}${status.slice(1)}`);
      count.textContent = String(tickets.length);
      if (!tickets.length) {
        list.innerHTML = '<div class="column-empty">Nothing here.</div>';
        return;
      }
      list.innerHTML = tickets.map((ticket) => {
        const mins = elapsedMinutes(ticket.created_at);
        const items = (ticket.items || []).map((item) => `
          <div class="ticket-item">
            <span>${item.qty}× ${escapeHtml(item.name)}</span>
          </div>
          ${item.note ? `<div class="note">${escapeHtml(item.note)}</div>` : ''}
        `).join('');
        return `
          <div class="ticket" data-id="${ticket.id}">
            <div class="ticket-head">
              <span class="ticket-label">${escapeHtml(ticket.table_label || 'Order')}</span>
              <span class="ticket-elapsed ${elapsedClass(mins)}">${mins}m</span>
            </div>
            <div class="ticket-type">${escapeHtml((ticket.order_type || 'dine_in').replace('_', ' '))}</div>
            <div class="ticket-items">${items}</div>
            <div class="ticket-actions">
              <button class="btn-advance" data-action="advance" data-id="${ticket.id}" data-status="${ticket.status}">${ACTION_LABEL[ticket.status]}</button>
              ${ticket.status !== 'ready' ? `<button class="btn-serve" data-action="serve" data-id="${ticket.id}">Served</button>` : ''}
              <button class="btn-cancel" data-action="cancel" data-id="${ticket.id}">✕</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function refresh() {
      try {
        const res = await fetch('/api/kitchen', { headers: authHeaders() });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        const tickets = Array.isArray(data.tickets) ? data.tickets : [];
        const byStatus = { new: [], preparing: [], ready: [] };
        let servedToday = 0;
        // Local calendar date, not .toISOString() (UTC) — updated_at is
        // stored as WIB wall-clock time, so this must compare on the same basis.
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        tickets.forEach((t) => {
          if (byStatus[t.status]) byStatus[t.status].push(t);
          if (t.status === 'served' && String(t.updated_at || '').slice(0, 10) === todayStr) servedToday += 1;
        });
        ['new', 'preparing', 'ready'].forEach((status) => {
          byStatus[status].sort((a, b) => a.id - b.id);
          renderColumn(status, byStatus[status]);
        });
        document.getElementById('statNew').textContent = byStatus.new.length;
        document.getElementById('statPreparing').textContent = byStatus.preparing.length;
        document.getElementById('statReady').textContent = byStatus.ready.length;
        document.getElementById('statServed').textContent = servedToday;
        document.getElementById('syncNote').textContent = `Updated ${new Date().toLocaleTimeString('id-ID')} — refreshes every 5s`;
      } catch (err) {
        document.getElementById('syncNote').textContent = 'Couldn’t reach the kitchen feed — retrying…';
      }
    }

    const confirmBackdrop = document.getElementById('confirmBackdrop');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');
    let confirmHandler = null;
    function askConfirm(onYes) {
      confirmHandler = onYes;
      confirmBackdrop.classList.add('open');
    }
    function closeConfirm() {
      confirmBackdrop.classList.remove('open');
      confirmHandler = null;
    }
    confirmNo.addEventListener('click', closeConfirm);
    confirmBackdrop.addEventListener('click', (e) => { if (e.target === confirmBackdrop) closeConfirm(); });
    confirmYes.addEventListener('click', () => {
      const fn = confirmHandler;
      closeConfirm();
      if (fn) fn();
    });

    document.querySelectorAll('.board').forEach((board) => {
      board.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const id = Number(button.dataset.id);
        if (!id) return;
        if (button.dataset.action === 'advance') {
          const next = NEXT_STATUS[button.dataset.status];
          if (!next) return;
          await fetch(`/api/kitchen/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ status: next })
          });
          refresh();
        } else if (button.dataset.action === 'serve') {
          // Shortcut: skip straight to Served from New or Preparing, without
          // stepping through Ready — the server already allows any status
          // jump (server/routes/kitchen.js), this just exposes it in the UI.
          await fetch(`/api/kitchen/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ status: 'served' })
          });
          refresh();
        } else if (button.dataset.action === 'cancel') {
          askConfirm(async () => {
            await fetch(`/api/kitchen/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', ...authHeaders() },
              body: JSON.stringify({ status: 'cancelled' })
            });
            refresh();
          });
        }
      });
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
