<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PIN Login – 8 NewLight Coffee</title>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    body {
      font-family: inherit;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--ink);
      padding: 12px;
    }

    .card {
      width: min(360px, 92vw);
      background: var(--card);
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
      color: var(--accent);
    }

    input {
      width: 100%;
      font-size: 20px;
      padding: 12px 12px;
      border-radius: 8px;
      box-sizing: border-box;
      letter-spacing: 6px;
      text-align: center;
      min-height: 48px;
    }

    select {
      width: 100%;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      min-height: 44px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 16px;
      color: var(--accent);
      margin: 6px 0;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    button {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #1b1f26;
      cursor: pointer;
      min-height: 48px;
    }

    button.secondary {
      background: #3a4150;
      color: #f4f6fb;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #f87171;
      min-height: 18px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 16px;
      }
      button {
        font-size: 20px;
      }
      .pad {
        gap: 10px;
      }
    }
  </style>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#5c7da6" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="8 NewLight" />
</head>
<body class="theme-cafe">
  <div class="card">
    <h1>🔐 Login</h1>
    <label for="username">User Name</label>
    <input id="username" type="text" placeholder="e.g. Owner" autocomplete="username" />
    <label for="pin">PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="6" minlength="4" pattern="\\d{4,6}" />

    <div class="pad" id="pad"></div>

    <div class="actions">
      <button class="secondary" id="clear">Clear</button>
      <button id="login">Login</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>

  <script>
    // Clear stale auth so login is always reachable after an improper logout.
    localStorage.removeItem('pos_auth');
  </script>
  <script src="/auth.js"></script>
  <script src="/dialogs.js"></script>
  <script src="/pwa.js"></script>
  <script>
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const pad = document.getElementById('pad');
    const statusEl = document.getElementById('status');
    const searchParams = new URLSearchParams(window.location.search);
    const nextParam = searchParams.get('next');
    if (searchParams.get('denied') === '1') {
      statusEl.textContent = 'Access denied — that page needs a different role. Log in with the right account.';
    }

    function redirectByRole(auth) {
      if (!auth) return;
      if (auth.role === 'staff') { window.location.replace('/clock.html'); return; }
      const home = auth.role === 'admin' ? '/dashboard.html' : '/system-report.html';
      window.location.replace(nextParam || home);
    }

    const existingAuth = getAuth();
    if (existingAuth) {
      redirectByRole(existingAuth);
    }

    const keys = ['1','2','3','4','5','6','7','8','9','0'];
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.textContent = k;
      btn.type = 'button';
      btn.addEventListener('click', () => {
        if (pinInput.value.length < pinInput.maxLength) {
          pinInput.value += k;
        }
      });
      pad.appendChild(btn);
    });

    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        pinInput.focus();
      }
    });

    async function doLogin() {
      const username = usernameInput.value.trim();
      const pin = pinInput.value.trim();
      if (!username || !pin) {
        statusEl.textContent = 'User name and PIN required';
        return;
      }
      if (!navigator.onLine) {
        statusEl.textContent = 'No internet connection. Please go online to login.';
        return;
      }

      statusEl.textContent = 'Checking…';
      fetch('/api/auth/pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin, name: username })
      })
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw { ...data, status: res.status };
          }
          return data;
        })
        .then(data => {
          setAuth(data);
          if (nextParam && data.role !== 'staff') {
            window.location.replace(nextParam);
            return;
          }
          redirectByRole(data);
        })
        .catch(async (err) => {
          const attempts = Number(err?.attempts || 0);
          const remaining = Number(err?.remaining || Math.max(0, 5 - attempts));
          if (err?.status === 429 || err?.error === 'User locked') {
            await appAlert('User locked. Please wait 5 minutes.');
          } else if (attempts >= 3) {
            await appAlert(`Warning: ${attempts} failed attempts. ${remaining} tries left.`);
          }
          statusEl.textContent = err?.error || 'Invalid credentials';
        });
    }

    document.getElementById('clear').addEventListener('click', () => {
      usernameInput.value = '';
      pinInput.value = '';
      statusEl.textContent = '';
    });

    document.getElementById('login').addEventListener('click', doLogin);
    pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
